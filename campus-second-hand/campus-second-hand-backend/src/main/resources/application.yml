server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: campus-second-hand-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:campus_second_hand}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: ${JWT_SECRET:campusSecondHandJwtSecretKey20260705}
  expire: ${JWT_EXPIRE:86400000}

logging:
  level:
    com.campus.mapper: debug

file:
  # Image upload directory. Override it with FILE_UPLOAD_PATH on the server.
  upload-path: ${FILE_UPLOAD_PATH:./uploads}
  # Public URL prefix for uploaded images.
  access-url-prefix: ${FILE_ACCESS_URL_PREFIX:/uploads/}
