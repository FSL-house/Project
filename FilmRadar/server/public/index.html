<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电影推荐系统</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #eee;
      overflow-x: hidden;
    }
    nav {
      background: rgba(20, 20, 40, 0.85);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding: 0 20px;
      position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between;
    }
    nav ul { display: flex; list-style: none; height: 70px; align-items: center; }
    nav li {
      margin-right: 30px; padding: 10px 20px; color: rgba(255,255,255,0.7);
      cursor: pointer; border-radius: 30px; transition: all 0.3s ease;
      font-weight: 500; letter-spacing: 1px; position: relative; overflow: hidden;
    }
    nav li::before {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(45deg, #ff6b6b, #feca57); opacity: 0;
      transition: opacity 0.3s; border-radius: 30px; z-index: -1;
    }
    nav li.active, nav li:hover {
      color: #fff; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.4);
    }
    nav li.active::before, nav li:hover::before { opacity: 0.2; }
    .user-area {
      display: flex; align-items: center; gap: 15px;
    }
    .user-area .username {
      color: #FFD700; font-weight: bold;
    }
    .user-area .logout-btn {
      background: rgba(255,255,255,0.2); border: none; color: #fff;
      padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: background 0.3s;
    }
    .user-area .logout-btn:hover { background: rgba(255,255,255,0.4); }
    .container { max-width: 1100px; margin: 20px auto; padding: 20px; position: relative; z-index: 1; }
    .page { display: none; animation: fadeSlide 0.5s ease; }
    .page.active { display: block; }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card {
      background: rgba(255,255,255,0.08);
      border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.1); margin-bottom: 25px;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(102,126,234,0.3); }
    .btn {
      background: linear-gradient(45deg, #667eea, #764ba2); border: none; color: white;
      padding: 10px 24px; border-radius: 30px; cursor: pointer; font-weight: bold;
      letter-spacing: 1px; transition: all 0.3s; box-shadow: 0 4px 15px rgba(102,126,234,0.4);
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(118,75,162,0.6); }
    .btn.active { background: linear-gradient(45deg, #f093fb, #f5576c); }
    .btn-group { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; }
    .reason-list {
      background: rgba(255,255,255,0.05);
      padding: 18px; border-radius: 16px; margin-bottom: 20px; border-left: 4px solid #feca57;
    }
    .reason-list li { margin: 6px 0; color: #ddd; }
    .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 25px; }
    .movie-card {
      background: rgba(255,255,255,0.06);
      border-radius: 20px; overflow: hidden; box-shadow: 0 8px 25px rgba(0,0,0,0.5);
      transition: transform 0.3s ease; cursor: pointer;
      border: 1px solid rgba(255,255,255,0.08); position: relative;
    }
    .movie-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(102,126,234,0.4);
    }
    .movie-card .poster { height: 300px; overflow: hidden; }
    .movie-card .poster img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .movie-card .info { padding: 15px; }
    .movie-card .title { font-size: 1.1em; font-weight: bold; color: #fff; margin-bottom: 5px; }
    .movie-card .meta { font-size: 0.85em; color: #aaa; margin-bottom: 10px; }
    .score-bar { background: rgba(255,255,255,0.15); height: 8px; border-radius: 10px; margin: 8px 0; overflow: hidden; }
    .score-bar div { height: 100%; background: linear-gradient(90deg, #f093fb, #f5576c); border-radius: 10px; transition: width 0.6s; }
    .stars { display: flex; flex-direction: row-reverse; justify-content: flex-end; }
    .stars input { display: none; }
    .stars label { font-size: 1.4em; color: #555; cursor: pointer; transition: color 0.2s; }
    .stars input:checked ~ label, .stars label:hover { color: #ffc107; }
    .chart-row { display: flex; gap: 25px; flex-wrap: wrap; margin-top: 20px; }
    .chart-box { flex: 1; min-width: 300px; height: 350px; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 10px; }
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center; align-items: center; z-index: 1000;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: rgba(30,30,50,0.95);
      border-radius: 24px; padding: 30px; max-width: 500px; width: 90%;
      border: 1px solid rgba(255,255,255,0.2); position: relative; color: #ddd;
    }
    .modal-close { position: absolute; top: 10px; right: 18px; font-size: 30px; cursor: pointer; }
    .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 25px; flex-wrap: wrap; }
    .pagination button {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: #ddd; padding: 8px 15px; border-radius: 8px; cursor: pointer;
    }
    .pagination button.active { background: linear-gradient(45deg, #667eea, #764ba2); border-color: transparent; }
    input[type="text"] {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; padding: 12px 20px; border-radius: 30px; font-size: 1em; outline: none; width: 100%;
    }
    input[type="text"]:focus { border-color: #667eea; }
    .mambo-sticker {
      position: fixed; bottom: 20px; right: 20px; width: 80px; height: 80px;
      cursor: pointer; z-index: 999; transition: transform 0.2s;
    }
    .mambo-sticker:hover { transform: scale(1.1); }
    .mambo-speech {
      position: fixed; bottom: 110px; right: 20px; background: rgba(0,0,0,0.8);
      color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 0.9em;
      display: none; z-index: 1000;
    }
    .gugugaga-badge {
      position: absolute; top: 10px; right: 10px; background: #ff6b6b; color: #fff;
      padding: 4px 10px; border-radius: 20px; font-size: 0.75em; font-weight: bold;
      display: none; z-index: 5; animation: popIn 0.3s ease;
    }
    @keyframes popIn {
      0% { transform: scale(0); } 100% { transform: scale(1); }
    }
  </style>
</head>
<body>
<img class="mambo-sticker" id="mamboSticker" src="https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif" alt="曼波" title="点击曼波">
<div class="mambo-speech" id="mamboSpeech">曼波！今天看电影了吗？</div>

<nav>
  <ul>
    <li class="active" data-page="recommend">🎯 个性化推荐</li>
    <li data-page="movies">🎬 电影库</li>
    <li data-page="randomrating">🎲 随机评分</li>
    <li data-page="myratings">⭐ 我的评分</li>
  </ul>
  <div class="user-area" id="userArea"></div>
</nav>

<div class="container">
  <div id="page-recommend" class="page active">
    <div class="btn-group">
      <button class="btn active" data-strategy="cf">🎯 协同过滤</button>
      <button class="btn" data-strategy="hot">🔥 热门推荐</button>
      <button class="btn" data-strategy="new">🆕 最新上映</button>
    </div>
    <div id="reasonBox" class="reason-list"></div>
    <div id="recMovieGrid" class="movie-grid"></div>
    <div class="chart-row">
      <div id="ratingChart" class="chart-box"></div>
      <div id="radarChart" class="chart-box"></div>
    </div>
    <button class="btn" id="refreshRec" style="margin-top:20px; background: linear-gradient(45deg, #f093fb, #f5576c);">🔄 换一批推荐</button>
  </div>
  <div id="page-movies" class="page">
    <div><input type="text" id="searchInput" placeholder="🔍 输入电影名称搜索..."></div>
    <div id="movieGrid" class="movie-grid"></div>
    <div class="pagination" id="pagination"></div>
  </div>
  <div id="page-randomrating" class="page">
    <div id="randomMovieGrid" class="movie-grid"></div>
    <button class="btn" id="submitRandomRatings" style="margin-top:20px;">提交所有评分</button>
  </div>
  <div id="page-myratings" class="page">
    <div id="ratingsList" class="card"></div>
  </div>
  <!-- 管理员页面 -->
  <div id="page-admin" class="page">
    <h2 style="color:#feca57;">🛠️ 管理员控制台</h2>
    <div id="adminUsers" class="card"></div>
    <div id="adminMovies" class="card"></div>
    <div id="adminRecs" class="card"></div>
  </div>
</div>

<div id="detailModal" class="modal">
  <div class="modal-content">
    <span class="modal-close">&times;</span>
    <div style="display:flex; gap:20px; align-items:flex-start; flex-wrap:wrap;">
      <img id="modalPoster" src="" alt="" style="width:150px; border-radius:10px; display:none;">
      <div style="flex:1; min-width:200px;">
        <h2 id="modalTitle" style="color:#fff;"></h2>
        <p id="modalMeta" style="color:#aaa; margin:5px 0;"></p>
        <p id="modalRating" style="color:#FFD700; font-size:1.2em; margin:5px 0;"></p>
        <p id="modalDesc" style="margin:10px 0;"></p>
        <p id="modalDirector" style="color:#feca57;"></p>
      </div>
    </div>
  </div>
</div>

<script>
  // 检查登录状态
  const storedUser = localStorage.getItem('currentUser');
  if (!storedUser) {
    window.location.href = '/login.html';
  }
  const currentUserObj = JSON.parse(storedUser);
  const currentUser = currentUserObj.user_id;
  const isAdmin = currentUserObj.is_admin || false;

  // 显示用户信息及退出按钮
  const userArea = document.getElementById('userArea');
  userArea.innerHTML = `
    <span class="username">👤 ${currentUserObj.username}</span>
    <button class="logout-btn" id="logoutBtn">退出</button>
  `;
  document.getElementById('logoutBtn').addEventListener('click', () => {
    localStorage.removeItem('currentUser');
    window.location.href = '/login.html';
  });

  // 如果是管理员，添加导航菜单
  if (isAdmin) {
    const adminLi = document.createElement('li');
    adminLi.setAttribute('data-page', 'admin');
    adminLi.textContent = '🛠️ 管理';
    document.querySelector('nav ul').appendChild(adminLi);
    adminLi.addEventListener('click', () => {
      document.querySelectorAll('nav li').forEach(i => i.classList.remove('active'));
      adminLi.classList.add('active');
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-admin').classList.add('active');
      loadAdminPage();
    });
  }

  let currentStrategy = 'cf';

  // 曼波贴纸
  const mamboSticker = document.getElementById('mamboSticker');
  const mamboSpeech = document.getElementById('mamboSpeech');
  const mamboQuotes = ['曼波！这部电影超赞！','曼波曼波～要看电影啦','咕咕嘎嘎的朋友你好！','Doro 让我告诉你，今天宜看电影','曼波推荐，必属精品'];
  mamboSticker.addEventListener('click', () => {
    const randomQuote = mamboQuotes[Math.floor(Math.random() * mamboQuotes.length)];
    mamboSpeech.textContent = randomQuote;
    mamboSpeech.style.display = 'block';
    setTimeout(() => { mamboSpeech.style.display = 'none'; }, 3000);
  });

  // 咕咕嘎嘎标记
  function attachGugugaga(cards) {
    cards.forEach(card => {
      if (Math.random() < 0.2) {
        const badge = document.createElement('span');
        badge.className = 'gugugaga-badge';
        badge.textContent = '咕咕嘎嘎！';
        card.appendChild(badge);
        setTimeout(() => { badge.style.display = 'block'; }, 100);
        setTimeout(() => { badge.style.display = 'none'; }, 4000);
      }
    });
  }

  // 图表初始化
  function initChart(domId) {
    const dom = document.getElementById(domId);
    let instance = echarts.getInstanceByDom(dom);
    if (instance) instance.dispose();
    return echarts.init(dom);
  }

  // 标签页切换
  document.querySelectorAll('nav li').forEach(item => {
    item.addEventListener('click', () => {
      const page = item.dataset.page;
      document.querySelectorAll('nav li').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(`page-${page}`).classList.add('active');
      if (page === 'recommend') loadRecommend(currentStrategy);
      if (page === 'movies') loadMovies();
      if (page === 'randomrating') loadRandomRating();
      if (page === 'myratings') loadMyRatings();
      if (page === 'admin') loadAdminPage();
    });
  });

  // 策略按钮
  document.querySelectorAll('.btn-group .btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.btn-group .btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentStrategy = this.dataset.strategy;
      loadRecommend(currentStrategy);
    });
  });

  document.getElementById('refreshRec').addEventListener('click', () => {
    loadRecommend('cf', true);
    document.querySelectorAll('.btn-group .btn').forEach(b => b.classList.remove('active'));
  });

  // 弹窗关闭
  document.querySelector('.modal-close').addEventListener('click', () => {
    document.getElementById('detailModal').classList.remove('active');
  });
  window.addEventListener('click', (e) => {
    if (e.target === document.getElementById('detailModal')) {
      document.getElementById('detailModal').classList.remove('active');
    }
  });

  // 电影详情函数
  function showMovieDetail(movieId) {
    fetch(`/api/movie/detail?movie_id=${movieId}`)
      .then(response => {
        if (!response.ok) throw new Error('服务器返回错误状态码：' + response.status);
        return response.json();
      })
      .then(detail => {
        if (detail.error && !detail.title) {
          alert('获取详情失败：' + detail.error);
          return;
        }
        document.getElementById('modalTitle').textContent = detail.title || '未知';
        document.getElementById('modalMeta').textContent = `${detail.genres || ''} | ${detail.year || ''} | 均分 ${detail.avg_rating || 0}`;
        const rating = Math.round(detail.avg_rating || 0);
        const stars = '★'.repeat(rating) + '☆'.repeat(5 - rating);
        document.getElementById('modalRating').innerHTML = stars + ` ${detail.avg_rating || 0}`;
        document.getElementById('modalDesc').textContent = detail.description || '暂无简介';
        document.getElementById('modalDirector').textContent = `导演：${detail.director || '未知'}`;
        const posterImg = document.getElementById('modalPoster');
        if (detail.poster_url) {
          posterImg.src = detail.poster_url;
          posterImg.style.display = 'block';
        } else {
          posterImg.style.display = 'none';
        }
        document.getElementById('detailModal').classList.add('active');
      })
      .catch(err => {
        console.error('加载详情出错:', err);
        alert('加载失败：' + err.message);
      });
  }

  // 事件代理
  document.getElementById('recMovieGrid').addEventListener('click', (e) => {
    const card = e.target.closest('.movie-card');
    if (!card) return;
    if (e.target.closest('.stars')) return;
    showMovieDetail(card.dataset.id);
  });

  document.getElementById('movieGrid').addEventListener('click', (e) => {
    const card = e.target.closest('.movie-card');
    if (!card) return;
    if (e.target.tagName === 'LABEL') {
      const rating = parseInt(e.target.previousElementSibling.value);
      const movieId = card.dataset.id;
      fetch('/api/rate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ user_id: currentUser, movie_id: movieId, rating })
      }).then(() => alert('评分成功！')).catch(err => console.error(err));
      return;
    }
    showMovieDetail(card.dataset.id);
  });

  // 随机评分模块
  async function loadRandomRating() {
    try {
      const res = await fetch(`/api/random_movies?user_id=${currentUser}&count=10`);
      const data = await res.json();
      const grid = document.getElementById('randomMovieGrid');
      grid.innerHTML = data.movies.map(m => `
        <div class="movie-card" data-id="${m.movie_id}">
          <div class="poster">
            <img src="${m.poster_url}" alt="${m.title}" onerror="this.onerror=null; this.src='https://picsum.photos/300/450?random=${m.movie_id}';">
          </div>
          <div class="info">
            <div class="title">${m.title}</div>
            <div class="meta">${m.genres.replace(/\|/g, ' / ')}</div>
            <div class="stars" data-movie="${m.movie_id}">
              ${[5,4,3,2,1].map(s => `<input type="radio" id="rm${m.movie_id}_${s}" name="movie_${m.movie_id}" value="${s}"><label for="rm${m.movie_id}_${s}">★</label>`).join('')}
            </div>
          </div>
        </div>
      `).join('');

      document.getElementById('submitRandomRatings').onclick = async () => {
        const ratings = [];
        document.querySelectorAll('#randomMovieGrid .movie-card').forEach(card => {
          const movieId = card.dataset.id;
          const checked = card.querySelector(`input[name="movie_${movieId}"]:checked`);
          if (checked) {
            ratings.push({ movie_id: parseInt(movieId), rating: parseInt(checked.value) });
          }
        });
        if (ratings.length === 0) {
          alert('请至少为一部电影打分');
          return;
        }
        const subRes = await fetch('/api/submit_ratings', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ user_id: currentUser, ratings })
        });
        const subData = await subRes.json();
        if (subData.code === 0) {
          alert('评分提交成功！推荐结果已更新，请查看推荐页。');
          document.querySelector('nav li[data-page="recommend"]').click();
        } else {
          alert(subData.msg || '提交失败');
        }
      };
    } catch (err) {
      console.error(err);
    }
  }

  // 加载推荐（修正推荐指数）
  async function loadRecommend(strategy, forceRefresh = false) {
    try {
      const res = await fetch(`/api/recommend?user_id=${currentUser}&strategy=${strategy}&force_refresh=${forceRefresh}`);
      const data = await res.json();
      const grid = document.getElementById('recMovieGrid');
      grid.innerHTML = (data.movies || []).map(m => {
        // 修正：将 ALS 评分（1-5）映射为百分比
        const percent = Math.min(100, (m.score / 5 * 100)).toFixed(0);
        return `
          <div class="movie-card" data-id="${m.movie_id}">
            <div class="poster">
              <img src="${m.poster_url || ''}" alt="${m.title || ''}" 
                   onerror="this.onerror=null; this.src='https://picsum.photos/300/450?random=${m.movie_id}';">
            </div>
            <div class="info">
              <div class="title">${m.title || '未知'}</div>
              <div class="meta">${(m.genres || '').replace(/\|/g, ' / ')}</div>
              <div class="score-bar"><div style="width:${percent}%"></div></div>
              <small style="color:#ccc;">推荐度 ${percent}%</small>
            </div>
          </div>`;
      }).join('');
      attachGugugaga(document.querySelectorAll('#recMovieGrid .movie-card'));

      const reasonRes = await fetch(`/api/recommend/reason?user_id=${currentUser}`);
      const reasonData = await reasonRes.json();
      document.getElementById('reasonBox').innerHTML = `<strong>📌 推荐理由：</strong><ul>${(reasonData.reasons || []).map(r => `<li>${r}</li>`).join('')}</ul>`;

      // 图表
      try {
        const scoreBins = ['0-20%', '20-40%', '40-60%', '60-80%', '80-100%'];
        const binCounts = [0,0,0,0,0];
        (data.movies || []).forEach(m => {
          const s = (m.score / 5 * 100);
          if (s <= 20) binCounts[0]++;
          else if (s <= 40) binCounts[1]++;
          else if (s <= 60) binCounts[2]++;
          else if (s <= 80) binCounts[3]++;
          else binCounts[4]++;
        });
        const chart1 = initChart('ratingChart');
        chart1.setOption({
          title: { text: '推荐度分布', left: 'center', textStyle: { color: '#fff' } },
          tooltip: {},
          xAxis: { data: scoreBins, axisLine: { lineStyle: { color: '#666' } } },
          yAxis: { axisLine: { lineStyle: { color: '#666' } } },
          series: [{
            type: 'bar', data: binCounts,
            color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#f093fb'},{offset:1,color:'#f5576c'}])
          }]
        });

        const typeList = ['剧情','爱情','科幻','动画','喜剧','动作','奇幻','犯罪'];
        const typeScores = {};
        typeList.forEach(t => { typeScores[t] = 0; });
        (data.movies || []).forEach(m => {
          (m.genres || '').split('|').forEach(g => {
            if (typeScores.hasOwnProperty(g)) typeScores[g] += (m.score || 0);
          });
        });
        const maxVal = Math.max(...Object.values(typeScores), 1);
        const radarData = typeList.map(t => parseFloat((typeScores[t] / maxVal * 5).toFixed(2)));
        const radarChart = initChart('radarChart');
        radarChart.setOption({
          title: { text: '推荐类型偏好雷达', left: 'center', textStyle: { color: '#fff' } },
          tooltip: {},
          radar: {
            indicator: typeList.map(t => ({ name: t, max: 5 })),
            axisName: { color: '#ccc' },
            splitArea: { areaStyle: { color: ['rgba(255,255,255,0.02)','rgba(255,255,255,0.05)'] } }
          },
          series: [{
            type: 'radar',
            data: [{ value: radarData, name: '偏好', areaStyle: { color: 'rgba(102,126,234,0.4)' } }],
            lineStyle: { color: '#feca57' }, itemStyle: { color: '#feca57' }
          }]
        });
      } catch (chartErr) {
        console.error('[Chart]', chartErr);
      }
    } catch (err) {
      console.error(err);
    }
  }

  // 电影库（分页）
  async function loadMovies(page = 1, searchTerm = '') {
    try {
      const res = await fetch(`/api/movies?page=${page}&size=20&search=${searchTerm}`);
      const data = await res.json();
      const grid = document.getElementById('movieGrid');
      grid.innerHTML = (data.movies || []).map(m => `
        <div class="movie-card" data-id="${m.movie_id}">
          <div class="poster">
            <img src="${m.poster_url || ''}" alt="${m.title || ''}" 
                 onerror="this.onerror=null; this.src='https://picsum.photos/300/450?random=${m.movie_id}';">
          </div>
          <div class="info">
            <div class="title">${m.title || '未知'}</div>
            <div class="meta">${(m.genres || '').replace(/\|/g, ' / ')} | ${m.year || ''}</div>
            <div class="stars" data-movie="${m.movie_id}">
              ${[5,4,3,2,1].map(s => `<input type="radio" id="s${m.movie_id}_${s}" name="r_${m.movie_id}" value="${s}"><label for="s${m.movie_id}_${s}">★</label>`).join('')}
            </div>
          </div>
        </div>
      `).join('');
      attachGugugaga(document.querySelectorAll('#movieGrid .movie-card'));
      renderPagination(data.totalPages, data.page, searchTerm);
    } catch (err) {
      console.error(err);
    }
  }

  function renderPagination(totalPages, currentPage, searchTerm) {
    const paginationDiv = document.getElementById('pagination');
    let html = '';
    if (totalPages > 1) {
      html += `<button ${currentPage === 1 ? 'disabled' : ''} data-page="${currentPage - 1}">‹ 上一页</button>`;
      const maxButtons = 10;
      let start = Math.max(1, currentPage - Math.floor(maxButtons/2));
      let end = Math.min(totalPages, start + maxButtons - 1);
      if (end - start + 1 < maxButtons) start = Math.max(1, end - maxButtons + 1);
      for (let i = start; i <= end; i++) {
        html += `<button class="${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
      }
      html += `<button ${currentPage === totalPages ? 'disabled' : ''} data-page="${currentPage + 1}">下一页 ›</button>`;
    }
    paginationDiv.innerHTML = html;
    document.querySelectorAll('#pagination button').forEach(btn => {
      btn.addEventListener('click', function() {
        const page = parseInt(this.dataset.page);
        if (page >= 1 && page <= totalPages) loadMovies(page, searchTerm);
      });
    });
  }

  document.getElementById('searchInput').addEventListener('input', (e) => {
    loadMovies(1, e.target.value);
  });

  async function deleteUser(userId) {
    if (!confirm('确定删除该用户及其所有评分和推荐数据？')) return;
    const res = await fetch('/api/admin/users/' + userId, { method: 'DELETE' });
    const data = await res.json();
    alert(data.msg || '删除完成');
    loadAdminPage();
  }

  async function deleteMovie(movieId) {
    if (!confirm('确定删除该电影及其关联数据？')) return;
    const res = await fetch('/api/admin/movies/' + movieId, { method: 'DELETE' });
    const data = await res.json();
    alert(data.msg || '删除完成');
    loadAdminPage();
  }

  function showAddMovieForm() {
    document.getElementById('addMovieForm').style.display = 'block';
  }

  async function addMovie() {
    const title = document.getElementById('newMovieTitle').value.trim();
    const genres = document.getElementById('newMovieGenres').value.trim();
    const year = document.getElementById('newMovieYear').value.trim();
    const poster_url = document.getElementById('newMoviePoster').value.trim();
    if (!title) { alert('请输入电影名'); return; }
    const res = await fetch('/api/admin/movies', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, genres, year: parseInt(year) || 2025, poster_url })
    });
    const data = await res.json();
    alert(data.msg || '添加完成');
    loadAdminPage();
  }

    async function loadMyRatings() {
    const res = await fetch(`/api/user/ratings?user_id=${currentUser}`);
    const data = await res.json();
    const container = document.getElementById('ratingsList');
    container.innerHTML = '<h2>⭐ 我已评分的电影</h2>';
    if (!data.ratings || data.ratings.length === 0) {
      container.innerHTML += '<p style="color:#aaa;">暂无评分记录</p>';
    } else {
      data.ratings.forEach(r => {
        container.innerHTML += `<div style="padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:space-between;"><span><strong>${r.title}</strong> - ${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)} <span style="color:#feca57;">(${r.rating}分)</span></span><button onclick="deleteRating(${r.movie_id})" style="background:#e74c3c; color:#fff; border:none; border-radius:6px; padding:4px 12px; cursor:pointer; font-size:0.85em;">删除</button></div>`;
      });
    }
  }

  async function deleteRating(movieId) {
    if (!confirm('确定要删除这条评分吗？')) return;
    const res = await fetch('/api/user/ratings', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: currentUser, movie_id: movieId })
    });
    const data = await res.json();
    if (data.code === 0) {
      loadMyRatings();
    } else {
      alert(data.msg || '删除失败');
    }
  }
